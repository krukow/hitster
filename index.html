<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b0b10">
<title>Hitster</title>
<style>
  :root { --accent: #1db954; --bg: #0b0b10; --fg: #f5f5f7; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg); color: var(--fg); font-family: -apple-system, system-ui, sans-serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100dvh; padding: env(safe-area-inset-top) 24px env(safe-area-inset-bottom);
    text-align: center; user-select: none;
  }
  .stage { display: flex; flex-direction: column; align-items: center; gap: 28px; }
  .btn {
    position: relative; width: 220px; height: 220px; border-radius: 50%;
    border: none; background: transparent; cursor: pointer; padding: 0;
  }
  .ring { position: absolute; inset: 0; transform: rotate(-90deg); }
  .ring circle { fill: none; stroke-width: 8; }
  .ring .track { stroke: #2a2a33; }
  .ring .prog { stroke: var(--accent); stroke-linecap: round;
    stroke-dasharray: 622; stroke-dashoffset: 622; transition: stroke-dashoffset .2s linear; }
  .glyph {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 84px; color: var(--fg);
  }
  .count { position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; font-size: 64px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .hint { font-size: 17px; color: #a0a0aa; letter-spacing: .3px; min-height: 22px; }
  .actions { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }
  .pill {
    border: 1px solid #33333d; background: #16161d; color: var(--fg);
    padding: 12px 22px; border-radius: 999px; font-size: 16px; cursor: pointer;
  }
  .pill:active { background: #22222c; }
  .answer { opacity: 0; transition: opacity .35s ease; max-width: 340px; }
  .answer.show { opacity: 1; }
  .answer .artist { font-size: 22px; font-weight: 700; }
  .answer .year { font-size: 54px; font-weight: 800; color: var(--accent); margin: 6px 0; }
  .answer .title { font-size: 18px; color: #c7c7d1; font-style: italic; }
  .answer .album { font-size: 14px; color: #7f7f8a; margin-top: 4px; }
  .next {
    margin-top: 10px; background: var(--accent); border: none; color: #06210f;
    font-weight: 700; padding: 13px 30px; border-radius: 999px; font-size: 17px; cursor: pointer;
  }
  .next:active { filter: brightness(0.92); }
  #scanner {
    position: fixed; inset: 0; background: #000; z-index: 10;
    display: flex; align-items: center; justify-content: center;
  }
  #scanner video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  #scanner .frame {
    position: relative; z-index: 1; width: 70vw; max-width: 300px; aspect-ratio: 1;
    border: 3px solid #fff; border-radius: 18px; box-shadow: 0 0 0 100vmax rgba(0,0,0,.5);
  }
  #scanner .shint { position: absolute; top: 12%; z-index: 1; color: #fff; font-size: 17px;
    text-shadow: 0 1px 3px #000; }
  #scanner .cancel { position: absolute; bottom: 9%; z-index: 1; }
  .hidden { display: none !important; }
  audio { display: none; }
</style>
</head>
<body>
  <div class="stage">
    <button class="btn" id="btn" aria-label="Play">
      <svg class="ring" viewBox="0 0 220 220">
        <circle class="track" cx="110" cy="110" r="99"></circle>
        <circle class="prog" id="prog" cx="110" cy="110" r="99"></circle>
      </svg>
      <div class="glyph" id="glyph">&#9654;</div>
      <div class="count hidden" id="count"></div>
    </button>
    <div class="hint" id="hint">Tap to play</div>
    <div class="actions hidden" id="actions">
      <button class="pill" id="replay">&#8635; Replay</button>
      <button class="pill" id="reveal">Reveal answer</button>
    </div>
    <div class="answer" id="answer" aria-live="polite"></div>
    <button class="next" id="next">Next &#9654;</button>
  </div>
  <div id="scanner" class="hidden">
    <video id="cam" playsinline muted></video>
    <div class="shint">Point at the next card</div>
    <div class="frame"></div>
    <button class="pill cancel" id="cancel">Cancel</button>
  </div>
  <canvas id="cv" class="hidden"></canvas>
  <audio id="audio" preload="auto" playsinline></audio>
<script>
const CLIP = 30;
const CIRC = 622;
const $ = id => document.getElementById(id);
const audio = $('audio'), prog = $('prog'), glyph = $('glyph'), count = $('count');
let track = null, timer = null, manifest = null, manifestDeck = null;

function currentDeck() {
  return new URLSearchParams(location.search).get('d') || '';
}
function manifestUrl(deck) {
  return deck ? 'tracks-' + deck + '.json' : 'tracks.json';
}

function setProgress(frac) { prog.style.strokeDashoffset = CIRC * (1 - frac); }

function resetUI() {
  cancelAnimationFrame(timer);
  audio.pause();
  setProgress(0);
  count.classList.add('hidden');
  glyph.classList.remove('hidden');
  $('actions').classList.add('hidden');
  const a = $('answer');
  a.classList.remove('show');
  a.innerHTML = '';
  $('hint').textContent = 'Tap to play';
}

async function boot() {
  resetUI();
  track = null;
  const id = decodeURIComponent(location.hash.replace(/^#/, '')).trim();
  if (!id) { $('hint').textContent = 'No track in this QR code.'; return; }
  const deck = currentDeck();
  try {
    if (!manifest || manifestDeck !== deck) {
      manifest = await (await fetch(manifestUrl(deck), { cache: 'force-cache' })).json();
      manifestDeck = deck;
    }
    track = manifest[id];
  } catch (e) { track = null; }
  if (!track || !track.p) { $('hint').textContent = 'Track not found.'; return; }
  audio.src = track.p;
}

function startCountdown() {
  const start = performance.now();
  cancelAnimationFrame(timer);
  const tick = now => {
    const elapsed = (now - start) / 1000;
    const remain = Math.max(0, CLIP - elapsed);
    count.textContent = Math.ceil(remain);
    setProgress(Math.min(1, elapsed / CLIP));
    if (elapsed >= CLIP) { stop(); return; }
    timer = requestAnimationFrame(tick);
  };
  timer = requestAnimationFrame(tick);
}

function play() {
  if (!track) return;
  audio.currentTime = 0;
  audio.play().then(() => {
    glyph.classList.add('hidden');
    count.classList.remove('hidden');
    $('hint').textContent = 'Listening\u2026';
    $('actions').classList.add('hidden');
    startCountdown();
  }).catch(() => { $('hint').textContent = 'Tap again to play'; });
}

function stop() {
  cancelAnimationFrame(timer);
  audio.pause();
  setProgress(0);
  count.classList.add('hidden');
  glyph.classList.remove('hidden');
  $('hint').textContent = 'Guess the year, then flip the card';
  $('actions').classList.remove('hidden');
}

$('btn').addEventListener('click', () => { if (audio.paused) play(); else stop(); });
$('replay').addEventListener('click', play);
$('reveal').addEventListener('click', () => {
  const a = $('answer');
  a.innerHTML = '<div class="artist">' + esc(track.a) + '</div>' +
                '<div class="year">' + esc(track.y) + '</div>' +
                '<div class="title">' + esc(track.t) + '</div>' +
                (track.l ? '<div class="album">' + esc(track.l) + '</div>' : '');
  a.classList.add('show');
});
audio.addEventListener('ended', stop);
function esc(s){ return (s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

// ---- in-page "Next" scanner ----
let stream = null, scanning = false;
const detector = ('BarcodeDetector' in window) ? new window.BarcodeDetector({ formats: ['qr_code'] }) : null;

function loadJsQR() {
  return new Promise((res, rej) => {
    if (window.jsQR) return res();
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js';
    s.onload = () => res(); s.onerror = rej;
    document.head.appendChild(s);
  });
}

function extractTarget(text) {
  let id = null, deck = '';
  try {
    const u = new URL(text, location.href);
    if (u.hash) id = decodeURIComponent(u.hash.slice(1)).trim();
    deck = new URLSearchParams(u.search).get('d') || '';
  } catch (e) {}
  if (!id && /^[0-9]+$/.test((text || '').trim())) id = text.trim();
  return id ? { id, deck } : null;
}

async function openScanner() {
  audio.pause();
  $('scanner').classList.remove('hidden');
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
  } catch (e) {
    $('scanner').classList.add('hidden');
    $('hint').textContent = 'Camera blocked \u2014 scan with your phone camera instead';
    return;
  }
  const cam = $('cam');
  cam.srcObject = stream;
  await cam.play().catch(() => {});
  if (!detector) { try { await loadJsQR(); } catch (e) {} }
  scanning = true;
  requestAnimationFrame(scanTick);
}

function closeScanner() {
  scanning = false;
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  $('scanner').classList.add('hidden');
}

async function scanTick() {
  if (!scanning) return;
  const cam = $('cam');
  let value = null;
  try {
    if (detector) {
      const codes = await detector.detect(cam);
      if (codes && codes.length) value = codes[0].rawValue;
    } else if (window.jsQR && cam.videoWidth) {
      const cv = $('cv');
      cv.width = cam.videoWidth; cv.height = cam.videoHeight;
      const g = cv.getContext('2d');
      g.drawImage(cam, 0, 0, cv.width, cv.height);
      const img = g.getImageData(0, 0, cv.width, cv.height);
      const r = window.jsQR(img.data, cv.width, cv.height);
      if (r) value = r.data;
    }
  } catch (e) {}
  if (value) {
    const t = extractTarget(value);
    if (t) {
      closeScanner();
      if (t.deck !== currentDeck()) {
        location.href = location.pathname + (t.deck ? '?d=' + encodeURIComponent(t.deck) : '') + '#' + t.id;
      } else if (location.hash.replace(/^#/, '') === t.id) {
        boot();
      } else {
        location.hash = '#' + t.id;
      }
      return;
    }
  }
  requestAnimationFrame(scanTick);
}

$('next').addEventListener('click', openScanner);
$('cancel').addEventListener('click', closeScanner);

window.addEventListener('hashchange', boot);
boot();
</script>
</body>
</html>
